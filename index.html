<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoverEDU — Legal</title>
  <style>
    :root{--bg:#ffffff;--surface:#f8f9fb;--border:#e8eaef;--text:#1a1d27;--muted:#6b7280;--accent:#2a5bd7;--accent-light:#eef2ff;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
    .logo{font-weight:800;font-size:32px;letter-spacing:-0.04em;margin-bottom:8px;}
    .logo span{color:var(--accent);}
    .tagline{font-size:15px;color:var(--muted);margin-bottom:48px;}
    .cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:560px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px 32px;text-decoration:none;color:var(--text);flex:1;min-width:200px;transition:border-color .15s,box-shadow .15s;}
    .card:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(42,91,215,.1);}
    .card-icon{font-size:28px;margin-bottom:12px;}
    .card h2{font-size:17px;font-weight:700;margin-bottom:6px;}
    .card p{font-size:13px;color:var(--muted);line-height:1.5;}
    .footer-note{margin-top:48px;font-size:13px;color:var(--muted);text-align:center;}
    .footer-note a{color:var(--accent);}
  </style>
</head>
<body>
  <div class="logo">Cover<span>EDU</span></div>
  <div class="tagline">Track what matters. Never miss a deadline.</div>
  <div class="cards">
    <a class="card" href="privacy.html">
      <div class="card-icon">🔒</div>
      <h2>Privacy Policy</h2>
      <p>How we collect, use, and protect your data.</p>
    </a>
    <a class="card" href="terms.html">
      <div class="card-icon">📄</div>
      <h2>Terms of Service</h2>
      <p>Rules and conditions for using CoverEDU.</p>
    </a>
  </div>
  <div class="footer-note">
    Questions? <a href="mailto:atrioxlir@gmail.com">atrioxlir@gmail.com</a>
  </div>
</body>
</html>
